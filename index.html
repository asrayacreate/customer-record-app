<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prerak CRM</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6fb;
      margin:0;
      padding:20px;
    }
    .container{
      max-width:800px;
      margin:auto;
      background:#fff;
      padding:20px;
      border-radius:12px;
      box-shadow:0 4px 18px rgba(0,0,0,.08);
    }
    h2,h3{margin:0 0 10px 0;}
    input,select,button{
      width:100%;
      padding:11px;
      margin-top:8px;
      border-radius:8px;
      border:1px solid #ccc;
      box-sizing:border-box;
      font-size:15px;
    }
    button{
      background:#0d6efd;
      color:#fff;
      border:none;
      cursor:pointer;
    }
    .card{
      background:#f8f9fa;
      border:1px solid #ddd;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
    }
    .section-gap{margin-top:22px;}
  </style>
</head>
<body>
  <div class="container">
    <h2>🙏 श्री गणेशाय नमः</h2>

    <input id="name" placeholder="Customer Name">
    <input id="phone" placeholder="Phone">
    <input id="alt" placeholder="Alternate Phone">
    <input id="address" placeholder="Address">
    <input id="product" placeholder="Service / Product">
    <input id="location" placeholder="Project Location">
    <input id="date" placeholder="Date / मिति">

    <select id="status">
      <option>New</option>
      <option>Follow-up Pending</option>
      <option>Interested</option>
      <option>Quotation Sent</option>
      <option>Order Confirmed</option>
      <option>Working</option>
      <option>Ready</option>
      <option>Completed</option>
      <option>Cancelled</option>
    </select>

    <input id="remarks" placeholder="Remarks">
    <button onclick="addCustomer()">Save Customer</button>

    <div class="section-gap">
      <h3>Customer List</h3>
      <div id="list"></div>
    </div>

    <div class="section-gap">
      <h3>Rate List</h3>
      <input id="itemName" placeholder="Item Name">
      <input id="itemRate" placeholder="Rate">
      <input id="itemStock" placeholder="Stock Quantity">
      <button onclick="addItem()">Add Item</button>
      <div id="rateList"></div>
    </div>
  </div>

  <script>
    function addCustomer() {
      const customers = JSON.parse(localStorage.getItem("crm")) || [];

      const customer = {
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        alt: document.getElementById("alt").value.trim(),
        address: document.getElementById("address").value.trim(),
        product: document.getElementById("product").value.trim(),
        location: document.getElementById("location").value.trim(),
        date: document.getElementById("date").value.trim(),
        status: document.getElementById("status").value,
        remarks: document.getElementById("remarks").value.trim()
      };

      if (!customer.name || !customer.phone) {
        alert("Name र Phone चाहिन्छ");
        return;
      }

      customers.push(customer);
      localStorage.setItem("crm", JSON.stringify(customers));

      document.getElementById("name").value = "";
      document.getElementById("phone").value = "";
      document.getElementById("alt").value = "";
      document.getElementById("address").value = "";
      document.getElementById("product").value = "";
      document.getElementById("location").value = "";
      document.getElementById("date").value = "";
      document.getElementById("remarks").value = "";
      document.getElementById("status").selectedIndex = 0;

      showCustomers();
      alert("Customer Saved");
    }

    function showCustomers() {
      const list = document.getElementById("list");
      const customers = JSON.parse(localStorage.getItem("crm")) || [];

      let html = "";
      customers.forEach((c, i) => {
        html += `
          <div class="card">
            <b>${i + 1}. ${c.name}</b><br>
            📞 ${c.phone}<br>
            📍 ${c.location || "-"}<br>
            📅 ${c.date || "-"}<br>
            📊 ${c.status}<br>
            📝 ${c.remarks || "-"}
          </div>
        `;
      });

      list.innerHTML = html;
    }

    function addItem() {
      const items = JSON.parse(localStorage.getItem("items")) || [];

      const name = document.getElementById("itemName").value.trim();
      const rate = document.getElementById("itemRate").value.trim();
      const stock = document.getElementById("itemStock").value.trim();

      if (!name || !rate) {
        alert("Item Name र Rate चाहिन्छ");
        return;
      }

      items.push({ name, rate, stock });
      localStorage.setItem("items", JSON.stringify(items));

      document.getElementById("itemName").value = "";
      document.getElementById("itemRate").value = "";
      document.getElementById("itemStock").value = "";

      showRates();
      alert("Item Saved");
    }

    function showRates() {
      const rateList = document.getElementById("rateList");
      const items = JSON.parse(localStorage.getItem("items")) || [];

      let html = "";
      items.forEach((item) => {
        html += `
          <div class="card">
            <b>${item.name}</b><br>
            Rs. ${item.rate}<br>
            Stock: ${item.stock || "-"}
          </div>
        `;
      });

      rateList.innerHTML = html;
    }

    window.onload = function () {
      showCustomers();
      showRates();
    };
  </script>
</body>
</html>
