<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prerak CRM</title>

<style>
body {font-family: Arial; background:#f4f6fb; padding:15px;}
.container {max-width:700px; margin:auto; background:white; padding:15px; border-radius:10px;}
input,select,button {width:100%; padding:10px; margin-top:8px; border-radius:6px; border:1px solid #ccc;}
button {background:#007bff; color:white;}
.card {background:#eef; padding:10px; margin-top:10px; border-radius:8px;}
.modal {display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;}
.modal-box {background:white; padding:15px; border-radius:10px;}
.rate-card {background:#f8f9fa; padding:10px; margin-top:8px; border-radius:8px; border:1px solid #ddd;}
</style>
</head>

<body>

<div class="container">

<h2>🙏 श्री गणेशाय नमः</h2>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="alt" placeholder="Alternate Phone">
<input id="address" placeholder="Address">
<input id="product" placeholder="Service / Product">
<input id="location" placeholder="Project Location">

<input id="date" placeholder="मिति छान्नुहोस्" readonly onclick="openDate()">

<select id="status">
<option>New</option>
<option>Follow-up Pending</option>
<option>Interested</option>
<option>Quotation Sent</option>
<option>Order Confirmed</option>
<option>Working</option>
<option>Ready</option>
<option>Completed</option>
<option>Cancelled</option>
</select>

<input id="remarks" placeholder="Remarks">

<button onclick="addCustomer()">Save Customer</button>

<h3>Rate List</h3>
 <h3>➕ Add Item</h3>

<input id="itemName" placeholder="Item Name">
<input id="itemRate" placeholder="Rate">
<input id="itemStock" placeholder="Stock Quantity">

<button onclick="addItem()">Add Item</button>
<div id="rateList"></div>

<h3>Customer List</h3>
<div id="list"></div>

</div>

<!-- DATE PICKER -->
<div class="modal" id="dateModal">
<div class="modal-box">
<select id="year"></select>
<select id="month"></select>
<select id="day"></select>
<button onclick="setDate()">OK</button>
<button onclick="closeDate()">Close</button>
</div>
</div>

<!-- WELCOME -->
<div class="modal" id="welcome">
<div class="modal-box">
<h3>श्री गणेशाय नमः</h3>
<p>Prerak CRM मा स्वागत छ</p>
<button onclick="closeWelcome()">OK</button>
</div>
</div>

<!-- FOLLOW ALERT -->
<div class="modal" id="alertBox">
<div class="modal-box">
<p>आज follow-up गर्नुपर्ने customer छन्</p>
<button onclick="closeAlert()">OK</button>
</div>
</div>

<script>

const months=["बैशाख","जेठ","असार","श्रावण","भदौ","आश्विन","कार्तिक","मंसिर","पुष","माघ","फागुन","चैत"];

const rates = [
 {item:"Gypsum Work", rate:"120", unit:"sqft"},
 {item:"2x2 Ceiling", rate:"145", unit:"sqft"},
 {item:"Smart Board / PVC Board", rate:"95", unit:"sqft"},
 {item:"Parquet Flooring", rate:"180", unit:"sqft"},
 {item:"Solar Panel", rate:"50000", unit:"set"},
 {item:"UPVC Window", rate:"850", unit:"sqft"},
 {item:"Aluminum Work", rate:"750", unit:"sqft"}
];

function nep(n){return n.toString().replace(/\d/g,d=>"०१२३४५६७८९"[d]);}

// date
function openDate(){
document.getElementById("dateModal").style.display="flex";
let y=document.getElementById("year"),m=document.getElementById("month"),d=document.getElementById("day");
y.innerHTML=""; m.innerHTML=""; d.innerHTML="";
for(let i=2080;i<=2090;i++) y.innerHTML+=`<option>${nep(i)}</option>`;
months.forEach(x=>m.innerHTML+=`<option>${x}</option>`);
for(let i=1;i<=32;i++) d.innerHTML+=`<option>${nep(i)}</option>`;
}

function setDate(){
let y=year.value,m=month.value,d=day.value;
document.getElementById("date").value=y+" "+m+" "+d;
closeDate();
}

function closeDate(){dateModal.style.display="none";}

// data
let data=JSON.parse(localStorage.getItem("crm"))||[];

function save(){
localStorage.setItem("crm",JSON.stringify(data));
show();
}

function addCustomer(){
let c={
name:name.value,
phone:phone.value,
alt:alt.value,
address:address.value,
product:product.value,
location:location.value,
date:date.value,
status:status.value,
remarks:remarks.value
};
if(!c.name||!c.phone){alert("Name/Phone चाहिन्छ");return;}
data.push(c);
save();
alert("Saved");
}

// show customer list
function show(){
let html="";
data.forEach((c,i)=>{
html+=`
<div class="card">
<b>${c.name}</b><br>
📞 ${c.phone}<br>
📍 ${c.location}<br>
📅 ${c.date}<br>
🔄 ${c.status}<br>
📝 ${c.remarks || ""}<br><br>

<button onclick="whatsapp(${i})">WhatsApp</button>
<button onclick="sms(${i})">SMS</button>
<button onclick="copyMsg(${i})">Copy</button>

</div>`;
});
list.innerHTML=html;
}

// show rate list
function showRates(){

let items = JSON.parse(localStorage.getItem("items")) || [];

let html = "";

items.forEach((item,i)=>{
html += `
<div class="card">
<b>${item.name}</b><br>
💰 Rs. ${item.rate}<br>
📦 Stock: ${item.stock}
</div>
`;
});

document.getElementById("rateList").innerHTML = html;
}

function addItem(){

let items = JSON.parse(localStorage.getItem("items")) || [];

let name = document.getElementById("itemName").value;
let rate = document.getElementById("itemRate").value;
let stock = document.getElementById("itemStock").value;

if(!name || !rate){
alert("Item Name र Rate चाहिन्छ");
return;
}

items.push({
name: name,
rate: rate,
stock: stock
});

localStorage.setItem("items", JSON.stringify(items));

alert("Item Saved Successfully");

document.getElementById("itemName").value="";
document.getElementById("itemRate").value="";
document.getElementById("itemStock").value="";

showRates();
}

if(!name || !rate){
alert("Item Name र Rate चाहिन्छ");
return;
}

items.push({
name: name,
rate: rate,
stock: stock
});

localStorage.setItem("items", JSON.stringify(items));

alert("Item Saved Successfully");

// clear fields
document.getElementById("itemName").value="";
document.getElementById("itemRate").value="";
document.getElementById("itemStock").value="";

showRates();
}
 function addItem(){
let items = JSON.parse(localStorage.getItem("items")) || [];

let name = document.getElementById("itemName").value;
let rate = document.getElementById("itemRate").value;
let stock = document.getElementById("itemStock").value;

if(!name || !rate){
alert("Item Name र Rate चाहिन्छ");
return;
}

items.push({name, rate, stock});

localStorage.setItem("items", JSON.stringify(items));

alert("Item Saved Successfully");

document.getElementById("itemName").value="";
document.getElementById("itemRate").value="";
document.getElementById("itemStock").value="";

showRates();
}
let items = JSON.parse(localStorage.getItem("items")) || [];

let item = {
name: itemName.value,
rate: itemRate.value,
stock: itemStock.value
};

if(!item.name || !item.rate){
alert("Item Name र Rate चाहिन्छ");
return;
}

items.push(item);
localStorage.setItem("items", JSON.stringify(items));

alert("Item Added");
showRates();
}

function showRates(){
let items = JSON.parse(localStorage.getItem("items")) || [];

let html = "<h3>Rate List</h3>";

items.forEach(i=>{
html += `<div class="rate-card">
<b>${i.name}</b><br>
Rate: Rs. ${i.rate}<br>
Stock: ${i.stock}
</div>`;
});

document.getElementById("list").innerHTML += html;
} 
let html="";
rates.forEach(r=>{
html+=`
<div class="rate-card">
<b>${r.item}</b><br>
Rate: रु. ${r.rate} / ${r.unit}
</div>`;
});
document.getElementById("rateList").innerHTML=html;
}

// whatsapp
function whatsapp(i){
let c=data[i];
let msg=`नमस्कार ${c.name} जी 🙏\nPrerak Construction बाट।`;
window.open("https://wa.me/977"+c.phone+"?text="+encodeURIComponent(msg));
}

// sms
function sms(i){
let c=data[i];
let msg=`Namaskar ${c.name}`;
window.location.href="sms:"+c.phone+"?body="+msg;
}

// copy
function copyMsg(i){
let c=data[i];
let msg=`Namaskar ${c.name}`;
navigator.clipboard.writeText(msg);
alert("Copied");
}

// popup
function closeWelcome(){welcome.style.display="none";}
function closeAlert(){alertBox.style.display="none";}

// load
window.onload=function(){
show();
showRates();
welcome.style.display="flex";
if(data.some(x=>x.status==="Follow-up Pending")){
alertBox.style.display="flex";
}
}

</script>

</body>
</html>
